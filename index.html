    function renderIacoesTab() {
        const bh = dashboardData.bh; const f = globalFilters;
        const convFunnel = bh.iacoes_conversion_funnel || {};
        const convDaily = bh.iacoes_conversion_daily || [];
        const convTickersDaily = bh.iacoes_converting_tickers_daily || [];
        const ov = bh.iacoes_overview || {};
        const daily = bh.iacoes_daily || [];
        const pagesDaily = bh.iacoes_pages_daily || [];
        const referrers = bh.iacoes_referrers || [];
        const referrerDaily = bh.iacoes_referrer_daily || [];
        // Daily breakdowns (RPC get_analytics_data_iacoes_daily) -- substitui snapshots all-time pra respeitarem o filtro temporal global
        const devicesDaily = bh.iacoes_devices_daily || [];
        const browsersDaily = bh.iacoes_browsers_daily || [];
        const osDaily = bh.iacoes_os_daily || [];
        const utmDaily = bh.iacoes_utm_daily || [];
        const ctaBreakdownDaily = bh.iacoes_cta_breakdown_daily || [];
        const ctaByPageDaily = bh.iacoes_cta_by_page_daily || [];
        const sourceDetectionDaily = bh.iacoes_source_detection_daily || [];
        const vsOtherConversionDaily = bh.iacoes_vs_other_conversion_daily || [];
        const hourlyDaily = bh.iacoes_hourly_daily || [];
        const conversionHourlyDaily = bh.iacoes_conversion_hourly_daily || [];

        // Helper local: agrega rows filtradas somando sumFields por chave composta.
        const aggregateBy = (rows, keyFields, sumFields) => {
            const out = {};
            rows.forEach(r => {
                const key = keyFields.map(k => r[k] ?? '').join('|');
                if (!out[key]) { out[key] = {}; keyFields.forEach(k => out[key][k] = r[k]); sumFields.forEach(s => out[key][s] = 0); }
                sumFields.forEach(s => out[key][s] += Number(r[s])||0);
            });
            return Object.values(out);
        };

        // Merge iacoes_daily (views, landing_sessions, cta_clicks) + iacoes_conversion_daily (BH sessions, logins, paywall, payments) by day
        const funnelByDay = {};
        daily.forEach(d => { funnelByDay[d.day] = { views: d.views||0, landing_sessions: d.sessions||0, cta_clicks: d.cta_clicks||0, sessions:0, unique_users:0, logins:0, paywall:0, payments:0 }; });
        convDaily.forEach(d => { if (!funnelByDay[d.day]) funnelByDay[d.day] = { views:0, landing_sessions:0, cta_clicks:0 }; Object.assign(funnelByDay[d.day], { sessions: d.sessions||0, unique_users: d.unique_users||0, logins: d.logins||0, paywall: d.paywall||0, payments: d.payments||0 }); });
        const funnelDailyMerged = Object.entries(funnelByDay).map(([day,v])=>({day,...v})).sort((a,b)=>a.day.localeCompare(b.day));

        // Filter by global date range and recalculate all funnel/overview values
        const filteredFunnel = filterSnapshot(funnelDailyMerged, f);
        const iacoesViews = filteredFunnel.reduce((s,d)=>s+(d.views||0),0);
        const ctaClicks = filteredFunnel.reduce((s,d)=>s+(d.cta_clicks||0),0);
        const bhSessions = filteredFunnel.reduce((s,d)=>s+(d.sessions||0),0);
        const bhUniqueUsers = filteredFunnel.reduce((s,d)=>s+(d.unique_users||0),0);
        const bhLogins = filteredFunnel.reduce((s,d)=>s+(d.logins||0),0);
        const bhPaywall = filteredFunnel.reduce((s,d)=>s+(d.paywall||0),0);
        const bhPayments = filteredFunnel.reduce((s,d)=>s+(d.payments||0),0);
        const loginRate = bhSessions>0?((bhLogins/bhSessions)*100).toFixed(1):'0';
        const paywallRate = bhSessions>0?((bhPaywall/bhSessions)*100).toFixed(1):'0';

        // Recalculate overview from filtered daily
        const filteredIacoesDaily = filterSnapshot(daily, f);
        const totalViews = filteredIacoesDaily.reduce((s,d)=>s+(d.views||0),0) || (ov.total_views||0);
        const totalSessions = filteredIacoesDaily.reduce((s,d)=>s+(d.sessions||0),0) || (ov.total_sessions||0);
        const totalCtaClicks = filteredIacoesDaily.reduce((s,d)=>s+(d.cta_clicks||0),0);

        // Aggregations from daily breakdowns (filtered by global date range)
        const devices = aggregateBy(filterSnapshot(devicesDaily, f), ['device_type'], ['views','sessions']).sort((a,b)=>(b.views||0)-(a.views||0));
        const browsers = aggregateBy(filterSnapshot(browsersDaily, f), ['browser'], ['views']).sort((a,b)=>(b.views||0)-(a.views||0));
        const osSummary = aggregateBy(filterSnapshot(osDaily, f), ['os'], ['views']).sort((a,b)=>(b.views||0)-(a.views||0));
        const utmData = aggregateBy(filterSnapshot(utmDaily, f), ['utm_source','utm_medium','utm_campaign'], ['views','sessions']).sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,20);
        const ctaBreakdown = aggregateBy(filterSnapshot(ctaBreakdownDaily, f), ['cta_id'], ['clicks','unique_sessions']).sort((a,b)=>(b.clicks||0)-(a.clicks||0));
        const ctaByPage = aggregateBy(filterSnapshot(ctaByPageDaily, f), ['cta_id','page_path'], ['clicks']).sort((a,b)=>(b.clicks||0)-(a.clicks||0)).slice(0,50);
        const detection = aggregateBy(filterSnapshot(sourceDetectionDaily, f), ['source_hint','click_id_source','referrer_status'], ['total']).sort((a,b)=>(b.total||0)-(a.total||0));
        const convComparisonAgg = aggregateBy(filterSnapshot(vsOtherConversionDaily, f), ['source'], ['sessions','logins','paywall']).sort((a,b)=>(b.sessions||0)-(a.sessions||0));
        const convComparison = convComparisonAgg.map(c => ({
            source: c.source, sessions: c.sessions, logins: c.logins, paywall: c.paywall,
            login_rate:  c.sessions>0 ? Math.round((c.logins  / c.sessions)*1000)/10 : 0,

        }));

            <div class="kpi-grid" id="iacoesTrafficKpis"></div>
            <div class="chart-container mb-2"><div class="chart-title">Views & Sessoes (diario)</div><canvas id="iacoesViewsDailyChart"></canvas></div>
            <div class="chart-container mb-2"><div class="chart-title">Origem do Trafego (diario)</div><canvas id="iacoesReferrerChart"></canvas></div>

                ${canvasHTML('iacoesBrowserChart','Navegador')}
                ${canvasHTML('iacoesOsChart','Sistema Operacional')}

        `);

            ${createKpiCard('Taxa de Login', loginRate+'%')}
            ${createKpiCard('Taxa de Paywall', paywallRate+'%')}

        `;

        const funnelSteps = [{l:'iAcoes Views',v:iacoesViews},{l:'CTA Clicks',v:ctaClicks},{l:'Sessoes BH',v:bhSessions},{l:'Logins',v:bhLogins},{l:'Paywall',v:bhPaywall},{l:'Pagamentos',v:bhPayments}];
        document.getElementById('iacoesConvFunnel').innerHTML = funnelSteps.map((step,i)=>{const prev=i>0?funnelSteps[i-1].v:0;const rate=prev>0?((step.v/prev)*100).toFixed(1)+'%':'';return`<div class="funnel-step"><span class="funnel-step-label">${step.l}${rate?' <span style="color:#3ecf8e;font-size:11px">('+rate+')</span>':''}</span><span class="funnel-step-value">${fmt(step.v)}</span></div>`;}).join('');

        const funnelTSPrep = prepareTimeSeries(funnelDailyMerged, f, ['views','landing_sessions','cta_clicks','sessions','logins','paywall','payments']);

        // ===== Visao Diaria - distribuicao por hora-do-dia =====
        const filteredHourly = filterSnapshot(hourlyDaily, f);
        const filteredConvHourly = filterSnapshot(conversionHourlyDaily, f);
        // Agregadas por hora (0..23) somando todos os dias do filtro
        const hourBuckets = (rows, fields) => {
            const out = Array.from({length:24}, (_,h) => { const o={hr:h}; fields.forEach(fld => o[fld]=0); return o; });
            rows.forEach(r => { const h=Number(r.hr)||0; fields.forEach(fld => out[h][fld] += Number(r[fld])||0); });
            return out;
        };
        const hourLanding = hourBuckets(filteredHourly, ['views','sessions','cta_clicks']);
        const hourConv    = hourBuckets(filteredConvHourly, ['sessions','logins','paywall','payments']);
        const hourLabels  = Array.from({length:24}, (_,h) => String(h).padStart(2,'0')+'h');

        const miniSeries = [
            {label:'Views',            data:hourLanding.map(d=>d.views),       total:iacoesViews,    color:'#6366f1'},

            {label:'CTA Clicks',       data:hourLanding.map(d=>d.cta_clicks),  total:ctaClicks,      color:'#f59e0b'},
            {label:'Sessoes -> BH',    data:hourConv.map(d=>d.sessions),       total:bhSessions,     color:'#3b82f6'},

            {label:'Pagamentos (BH)',  data:hourConv.map(d=>d.payments),       total:bhPayments,     color:'#22c55e'}
        ];
        document.getElementById('iacoesDailyMiniGrid').innerHTML = miniSeries.map((s,i) =>
            `<div class="chart-container" style="padding:12px"><div class="chart-title" style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span>${s.label}</span><span style="font-size:18px;font-weight:700;color:${s.color}">${fmt(s.total)}</span></div><canvas id="iacoesHourMini_${i}" height="80"></canvas></div>`
        ).join('');
        miniSeries.forEach((s,i) => {

                {label:'Logins',data:funnelTSPrep.data.map(d=>d.logins||0),borderColor:'#3b82f6',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4},

                {label:'Pagamentos',data:funnelTSPrep.data.map(d=>d.payments||0),borderColor:'#22c55e',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4}
            ]}, options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:10}}},tooltip:{callbacks:richTooltipCallbacks}},scales:{y:{type:'logarithmic',beginAtZero:false,grid:{color:'#f1f5f9'},ticks:{callback:v=>fmt(v)}}}}

            a.sessions += d.sessions||0; a.unique_users += d.unique_users||0;
            a.led_to_login += d.led_to_login||0; a.led_to_paywall += d.led_to_paywall||0;
        });
        const convTickers = Object.values(convTickersAgg).sort((a,b)=>b.sessions-a.sessions).slice(0,20);
        document.getElementById('iacoesConvTickersTable').innerHTML = `<thead><tr><th>Pagina</th><th>Sessoes</th><th>Usuarios</th><th>Logins</th><th>Taxa Login</th><th>Paywall</th><th>Taxa Paywall</th></tr></thead><tbody>${convTickers.map(t=>{const lr=t.sessions>0?((t.led_to_login/t.sessions)*100).toFixed(1):'0';const pr=t.sessions>0?((t.led_to_paywall/t.sessions)*100).toFixed(1):'0';return`<tr><td>${t.ticker}</td><td>${fmt(t.sessions||0)}</td><td>${fmt(t.unique_users||0)}</td><td>${fmt(t.led_to_login||0)}</td><td>${lr}%</td><td>${fmt(t.led_to_paywall||0)}</td><td>${pr}%</td></tr>`;}).join('')}</tbody>`;
        makeSortable(document.getElementById('iacoesConvTickersTable'));

        document.getElementById('iacoesTrafficKpis').innerHTML = `
            ${createKpiCard('Page Views', fmt(totalViews))}
            ${createKpiCard('Sessoes', fmt(totalSessions))}
            ${createKpiCard('Views/Sessao', totalSessions>0?(totalViews/totalSessions).toFixed(1):'0')}
            ${createKpiCard('CTA Clicks', fmt(totalCtaClicks))}
        `;

        const dailyPrep = prepareTimeSeries(daily, f, ['views','sessions']);
        destroyChart('iacoesViewsDailyChart');
        charts.iacoesViewsDailyChart = new Chart(document.getElementById('iacoesViewsDailyChart'),{
            type:'bar',data:{labels:dailyPrep.labels,datasets:[
                {label:'Views',data:dailyPrep.data.map(d=>d.views||0),backgroundColor:'#3ecf8e',order:2},
                {label:'Sessoes',data:dailyPrep.data.map(d=>d.sessions||0),type:'line',borderColor:'#6366f1',backgroundColor:'transparent',borderWidth:2,pointRadius:2,order:1}
            ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:10}}},tooltip:{callbacks:richTooltipCallbacks}},scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'}}}}
        });

        // Referrer daily (stacked bar over time)
        if (referrerDaily.length > 0) {
            const mcRef = prepareMultiCategoryTS(referrerDaily, f, 'source', 'views');
            const refSources = mcRef.categories;
            destroyChart('iacoesReferrerChart');
            charts.iacoesReferrerChart = new Chart(document.getElementById('iacoesReferrerChart'), {
                type:'bar',data:{labels:mcRef.labels,datasets:refSources.map((s,i)=>({label:s,data:mcRef.getValues(s),backgroundColor:COLORS[i%COLORS.length]}))},
                options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:richTooltipCallbacks}},scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,grid:{color:'#f1f5f9'}}}}
            });
        } else if (referrers.length > 0) {
            barChart('iacoesReferrerChart', referrers.map(r=>r.source), [{label:'Views',data:referrers.map(r=>r.views||0),backgroundColor:COLORS}], {horizontal:true});
        }

        // Source detection diagnostic table (detection ja agregado de sourceDetectionDaily filtrado)
        const detTable = document.getElementById('iacoesSourceDetectionTable');
        if (detection.length > 0 && detection.some(d => d.source_hint !== 'nenhum' || d.click_id_source !== 'nenhum')) {
            detTable.innerHTML = '<thead><tr><th>Source Hint (UA)</th><th>Click ID</th><th>Referrer</th><th>Total</th></tr></thead><tbody>' +
                detection.filter(d => d.source_hint !== 'nenhum' || d.click_id_source !== 'nenhum')
                    .map(d => `<tr><td>${d.source_hint}</td><td>${d.click_id_source}</td><td>${d.referrer_status}</td><td>${fmt(d.total)}</td></tr>`).join('') +
                '</tbody>';
            makeSortable(detTable);
        } else {
            detTable.closest('.table-container').innerHTML = '<div class="table-title">Deteccao de Fonte (Dark Social & Ads)</div><p style="color:var(--m);font-size:13px;padding:12px">Nenhum dado de source_hint ou click_id_source detectado ainda. Os dados aparecerao conforme usuarios acessem via in-app browsers ou links com click IDs.</p>';
        }

        // Aggregate top pages from daily data, filtered by date
        const filteredPagesDaily = filterSnapshot(pagesDaily, f);
        const pagesAgg = {};
        filteredPagesDaily.forEach(d => {
            if (!pagesAgg[d.page_path]) pagesAgg[d.page_path] = {page_path:d.page_path, views:0, sessions:0, cta_clicks:0};
            const a = pagesAgg[d.page_path];
            a.views += d.views||0; a.sessions += d.sessions||0; a.cta_clicks += d.cta_clicks||0;
        });
        const topPages = Object.values(pagesAgg).sort((a,b)=>b.views-a.views).slice(0,20);
        document.getElementById('iacoesTopPagesTable').innerHTML = `<thead><tr><th>Pagina</th><th>Views</th><th>Sessoes</th><th>CTA Clicks</th><th>Taxa CTA</th></tr></thead><tbody>${topPages.map(p=>{const pCtaClicks=Number(p.cta_clicks)||0;const pSessions=Number(p.sessions)||0;const pCtaRate=pSessions>0?((pCtaClicks/pSessions)*100).toFixed(1):'0';return`<tr><td>${p.page_path==='/'?'Home (/)':p.page_path}</td><td>${fmt(p.views||0)}</td><td>${fmt(pSessions)}</td><td>${fmt(pCtaClicks)}</td><td>${pCtaRate}%</td></tr>`;}).join('')}</tbody>`;
        makeSortable(document.getElementById('iacoesTopPagesTable'));

        // CTA Breakdown (ctaBreakdown e ctaByPage ja agregados de _daily filtrado no topo)
        const ctaDaily = bh.iacoes_cta_daily || [];
        const filteredCtaDaily = filterSnapshot(ctaDaily, f);

        if (ctaBreakdown.length > 0 && ctaBreakdown.some(c => c.cta_id !== 'sem_id')) {
            const ctaLabels = ctaBreakdown.map(c => c.cta_id);
            const ctaClicks2 = ctaBreakdown.map(c => c.clicks);
            barChart('iacoesCtaChart', ctaLabels, [{label:'Cliques',data:ctaClicks2,backgroundColor:'#3ecf8e'}], {horizontal:true});
        } else if (filteredCtaDaily.length > 0) {
            // Aggregate from daily
            const ctaAgg = {};
            filteredCtaDaily.forEach(d => { ctaAgg[d.cta_id] = (ctaAgg[d.cta_id]||0) + d.clicks; });
            const sorted = Object.entries(ctaAgg).sort((a,b)=>b[1]-a[1]);
            barChart('iacoesCtaChart', sorted.map(s=>s[0]), [{label:'Cliques',data:sorted.map(s=>s[1]),backgroundColor:'#3ecf8e'}], {horizontal:true});
        } else {
            document.getElementById('iacoesCtaChart').closest('.chart-container').innerHTML = '<div class="chart-title">Cliques por CTA</div><p style="color:var(--m);font-size:13px;padding:12px">Dados de CTA por botao disponiveis a partir de 10/abr/2026. Os cliques anteriores aparecem como "sem_id".</p>';
        }

        const ctaTable = document.getElementById('iacoesCtaTable');
        if (ctaByPage.length > 0 && ctaByPage.some(c => c.cta_id !== 'sem_id')) {
            ctaTable.innerHTML = '<thead><tr><th>CTA</th><th>Pagina</th><th>Cliques</th></tr></thead><tbody>' +
                ctaByPage.filter(c => c.cta_id !== 'sem_id').map(c => `<tr><td><code>${c.cta_id}</code></td><td>${c.page_path==='/'?'Home (/)':c.page_path}</td><td>${fmt(c.clicks)}</td></tr>`).join('') +
                '</tbody>';
            makeSortable(ctaTable);
        } else {
            ctaTable.closest('.table-container').innerHTML = '<div class="table-title">CTA x Pagina</div><p style="color:var(--m);font-size:13px;padding:12px">Aguardando dados de cta_id. Os novos cliques serao classificados automaticamente.</p>';
        }

        doughnutChart('iacoesDeviceChart', devices.map(d=>d.device_type), devices.map(d=>d.views||0), ['#3ecf8e','#6366f1','#f59e0b']);

        if (utmData.length > 0) {
            barChart('iacoesUtmChart', utmData.map(u=>`${u.utm_source}/${u.utm_medium||'-'}`), [{label:'Views',data:utmData.map(u=>u.views||0),backgroundColor:'#3b82f6'}], {horizontal:true});
        }

        if (browsers.length > 0) { doughnutChart('iacoesBrowserChart', browsers.map(b=>b.browser||'N/A'), browsers.map(b=>b.cnt||b.views||0), COLORS.slice(2)); }
        if (osSummary.length > 0) { doughnutChart('iacoesOsChart', osSummary.map(o=>o.os||'N/A'), osSummary.map(o=>o.cnt||o.views||0), COLORS); }
    }

    function renderHeatmap(containerId, data) {
        const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
        const maxVal = Math.max(...data.map(d=>d.events), 1);
        const grid = {}; data.forEach(d=>{grid[d.dow+'|'+d.hour]=d.events;});
        let html = '<table style="width:100%;font-size:11px;border-collapse:collapse"><tr><th></th>';
        for (let h=0;h<24;h++) html += '<th style="padding:2px 4px;color:var(--m)">'+h+'</th>';
        html += '</tr>';
        for (let dow=0;dow<7;dow++) {
            html += '<tr><td style="padding:4px;font-weight:600;color:var(--m)">'+dows[dow]+'</td>';
            for (let h=0;h<24;h++) {
                const v=grid[dow+'|'+h]||0;
                const op=v>0?(0.15+(v/maxVal)*0.85).toFixed(2):'0.05';
                html += '<td style="padding:2px 4px;text-align:center;background:rgba(62,207,142,'+op+');color:'+(op>0.5?'#fff':'var(--m)')+';border-radius:2px">'+(v||'')+'</td>';
            }
            html += '</tr>';
        }
        html += '</table>';
        document.getElementById(containerId).innerHTML = html;
    }

    // ===== TAB NAVIGATION =====
    let currentTab = 'bhVisao';

    function switchTab(tabName) {
        document.querySelectorAll('.sidebar-sub-item, .sidebar-item[data-tab]').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('show'));

        const subItem = document.querySelector(`.sidebar-sub-item[data-tab="${tabName}"]`);
        const sidebarItem = document.querySelector(`.sidebar-item[data-tab="${tabName}"]`);
        if (subItem) subItem.classList.add('active');
        if (sidebarItem) sidebarItem.classList.add('active');

        document.getElementById(tabName).classList.add('show');
        document.getElementById('currentTabTitle').textContent = TAB_TITLES[tabName] || tabName;
        currentTab = tabName;

        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');

        if (dashboardData) reRenderTab(tabName);
        setTimeout(()=>{Object.values(charts).forEach(chart=>{try{chart.resize();}catch(e){}});},100);
    }

    function reRenderTab(tabName) {
        if (!dashboardData) return;
        try {
            const renderMap = {
                bhVisao: renderBhVisao, bhAquisicao: renderBhAquisicao, bhEngajamento: renderBhEngajamento,
                bhAirton: renderBhAirton,
                bhRetencao: renderBhRetencao, bhCustos: renderBhCustos, bhDetalhes: renderBhDetalhes,
                htaVisao: renderHtaVisao, htaAquisicao: renderHtaAquisicao, htaEngajamento: renderHtaEngajamento,
                htaRetencao: renderHtaRetencao, htaCustos: renderHtaCustos, htaDetalhes: renderHtaDetalhes,
                iacoes: renderIacoesTab
            };
            if (renderMap[tabName]) renderMap[tabName]();
        } catch(e) { console.error(`Render error [${tabName}]:`, e); }
    }

    // ===== AUTHENTICATION =====
    async function login(email, password) {
        showLoading(true);
        try {
            const response = await fetch(`${HTA_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': HTA_ANON_KEY },
                body: JSON.stringify({ email, password })
            });
            if (!response.ok) throw new Error('Credenciais invalidas');
            const data = await response.json();
            currentToken = data.access_token;
            localStorage.setItem('dashToken', currentToken);
            showLoading(false);
            await loadDashboard();
        } catch (error) { showLoading(false); showError(error.message || 'Erro ao fazer login'); }
    }

    function logout() {
        currentToken = null; currentAdmin = null; dashboardData = null;
        localStorage.removeItem('dashToken');
        Object.keys(charts).forEach(key=>destroyChart(key)); charts = {};
        if (refreshInterval) clearInterval(refreshInterval);
        document.getElementById('loginContainer').classList.remove('hidden');
        document.getElementById('dashboard').classList.remove('show');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        clearError();
    }

    function showError(msg) { const err = document.getElementById('errorMessage'); err.textContent = msg; err.classList.add('show'); }
    function clearError() { document.getElementById('errorMessage').classList.remove('show'); }

    async function fetchAnalytics() {
        try {
            const params = new URLSearchParams();
            if (globalFilters.from) params.set('from', `${globalFilters.from}T00:00:00.000Z`);
            if (globalFilters.to)   params.set('to',   `${globalFilters.to}T23:59:59.999Z`);
            if (window._airtonIncludeAdmins) params.set('include_admins', 'true');
            // 2026-05-27: params do bloco de tickers (Engajamento iAcoes).
            const tf = window._bhTickerFilters;
            if (tf) {
                if (tf.includeAdmins) params.set('bh_ticker_include_admins', 'true');
                if (tf.selected && tf.selected.length > 0) params.set('bh_tickers', tf.selected.join(','));
            }
            const url = params.toString() ? `${API_ENDPOINT}?${params}` : API_ENDPOINT;
            const response = await fetch(url, { method: 'GET', headers: { 'Authorization': `Bearer ${currentToken}` } });
            if (response.status === 401) throw new Error('Sessao expirada. Faca login novamente.');
            if (response.status === 403) throw new Error('Acesso negado. Apenas administradores podem acessar o dashboard.');
            if (!response.ok) throw new Error(`Erro ${response.status} ao buscar dados`);
            return await response.json();
        } catch (error) { console.error('API Error:', error); throw error; }
    }

    let refetchInFlight = null;
    async function refetchAndRerender() {
        if (refetchInFlight) return refetchInFlight;
        refetchInFlight = (async () => {
            try {
                const data = await fetchAnalytics();
                if (data) { dashboardData = data; window.dashData = data; reRenderTab(currentTab); }
            } catch (e) { console.error('Refetch error:', e); }
            finally { refetchInFlight = null; }
        })();
        return refetchInFlight;
    }
    // Debounced version: coalesces rapid date-picker changes into one refetch.
    let refetchDebounceTimer = null;
    function refetchAndRerenderDebounced() {
        if (refetchDebounceTimer) clearTimeout(refetchDebounceTimer);
        refetchDebounceTimer = setTimeout(() => { refetchDebounceTimer = null; refetchAndRerender(); }, 400);
    }

    function applyPreset(days) {
        const to = new Date().toISOString().slice(0,10);
        const from = new Date(Date.now()-days*86400000).toISOString().slice(0,10);
        globalFilters.from = from;
        globalFilters.to = to;
        globalFilters.preset = days.toString();
        refetchAndRerender();
    }

    async function loadDashboard() {
        showLoading(true);
        try {
            dashboardData = await fetchAnalytics();
            if (!dashboardData) return;
            currentAdmin = dashboardData.admin;
            window.dashData = dashboardData;
            document.getElementById('adminBadge').textContent = currentAdmin;
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dashboard').classList.add('show');
            applyPreset(30);
            // Render all tabs once for initial data
            const allTabs = ['bhVisao','bhAquisicao','bhEngajamento','bhAirton','bhRetencao','bhCustos','bhDetalhes','htaVisao','htaAquisicao','htaEngajamento','htaRetencao','htaCustos','htaDetalhes','iacoes'];
            allTabs.forEach(tab=>{ try { reRenderTab(tab); } catch(e) { console.error(`Render error [${tab}]:`, e); } });

            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async()=>{
                try { dashboardData = await fetchAnalytics(); window.dashData = dashboardData; if(dashboardData) reRenderTab(currentTab); } catch(e) { console.error('Refresh error:', e); }
            }, 5*60*1000);
            showLoading(false);
        } catch (error) {
            showLoading(false);
            console.error('Dashboard Error:', error);
            showError('Erro ao carregar dashboard: '+(error.message||'erro desconhecido'));
        }
    }

    // ===== EVENT LISTENERS =====
    document.getElementById('loginForm').addEventListener('submit', async(e)=>{
        e.preventDefault(); clearError();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').innerHTML = '<span class="spinner"></span><span>Entrando...</span>';
        await login(email, password);
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').innerHTML = 'Entrar';
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);

    // Sidebar group toggle
    document.querySelectorAll('.sidebar-group-header').forEach(header=>{
        header.addEventListener('click', ()=>{
            const group = header.dataset.group;
            const items = document.getElementById('group-'+group);
            header.classList.toggle('open');
            items.classList.toggle('open');
        });
    });

    // Sidebar sub-item navigation
    document.querySelectorAll('.sidebar-sub-item').forEach(item=>{
        item.addEventListener('click', ()=>switchTab(item.dataset.tab));
    });

    // Sidebar standalone items
    document.querySelectorAll('.sidebar-item[data-tab]').forEach(item=>{
        item.addEventListener('click', ()=>switchTab(item.dataset.tab));
    });

    // Hamburger
    document.getElementById('hamburgerBtn').addEventListener('click', ()=>{
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('show');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', ()=>{
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    });

    // Global presets
    document.querySelectorAll('.preset-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
            const days = btn.dataset.days;
            document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            if (days === 'custom') { document.getElementById('dateRangeInputs').style.display = 'flex'; }
            else { document.getElementById('dateRangeInputs').style.display = 'none'; applyPreset(parseInt(days)); }
        });
    });

    document.getElementById('globalFrom').addEventListener('change', ()=>{ globalFilters.from = document.getElementById('globalFrom').value; globalFilters.preset = 'custom'; refetchAndRerenderDebounced(); });
    document.getElementById('globalTo').addEventListener('change', ()=>{ globalFilters.to = document.getElementById('globalTo').value; globalFilters.preset = 'custom'; refetchAndRerenderDebounced(); });

    document.getElementById('globalGranToggle').addEventListener('click', (e)=>{
        const btn = e.target.closest('.gran-btn');
        if (!btn) return;
        globalFilters.gran = btn.dataset.gran;
        document.getElementById('globalGranToggle').querySelectorAll('.gran-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        reRenderTab(currentTab);
    });

    updateTimestamp();
    setInterval(updateTimestamp, 1000);

    window.addEventListener('load', ()=>{
        const storedToken = localStorage.getItem('dashToken');
        if (storedToken) { currentToken = storedToken; loadDashboard(); }
    });
    </script>
</body>
</html>
